<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בלעם — סוכן ידע לפרשת שבוע</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <header class="app-header">
    <h1>בלעם</h1>
    <p class="subtitle">סוכן ידע לפרשת שבוע — טקסט התורה ופרשנים קלאסיים, פסוק ומקור בכל תשובה</p>
  </header>

  <section class="api-key-box">
    <label for="api-key">מפתח Anthropic API</label>
    <div class="api-key-row">
      <input type="password" id="api-key" placeholder="sk-ant-...">
      <button type="button" id="toggle-key" class="icon-btn" aria-label="הצג/הסתר מפתח">👁</button>
      <button type="button" id="save-key" class="secondary-btn">שמור</button>
    </div>
    <p class="hint">המפתח שלך נשמר רק בדפדפן שלך (localStorage) ונשלח לשרת רק בזמן שאלה — הוא לא נשמר בשום שרת.</p>
  </section>

  <section class="chat-box" id="chat-box"></section>

  <form class="composer" id="composer">
    <input type="text" id="question" placeholder='שאל על פרשת בלק, למשל: "מה אמרה האתון לבלעם?"' autocomplete="off">
    <button type="submit" id="send-btn">שאל</button>
  </form>
</div>
<script src="app.js"></script>
</body>
</html>
